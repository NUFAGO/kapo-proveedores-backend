# ============================================================================
# ESQUEMA DE AUTENTICACIÓN Y USUARIOS - Gestión de Auth, Usuarios y Roles
# ============================================================================

# ============================================================================
# TIPOS DE AUTENTICACIÓN
# ============================================================================

type Role {
  id: ID
  nombre: String
  descripcion: String
  menusPermissions: [MenuPermission!]!
  createdAt: DateTime!
  updatedAt: DateTime!
  deleted: Boolean!
}

type MenuPermission {
  menuID: ID
  permissions: Permission!
}

type Permission {
  ver: Boolean!
  crear: Boolean!
  editar: Boolean!
  eliminar: Boolean!
}

# LoginResponse / login ELIMINADOS — identidad admin vía kapo-autentificacion (gateway).

input MenuPermissionInput {
  menuID: ID!
  permissions: PermissionInput!
}

input PermissionInput {
  ver: Boolean!
  crear: Boolean!
  editar: Boolean!
  eliminar: Boolean!
}

# ============================================================================
# TIPOS DE USUARIO
# ============================================================================

type Usuario {
  id: ID!
  nombres: String
  apellidos: String
  usuario: String
  dni: String
  cargo_id: Cargo
  rol_id: String
  telefono: String
  firma: String
  foto_perfil: String
  email: String
}

input UsuarioInput {
  nombres: String
  apellidos: String
  usuario: String
  dni: String
  contrasenna: String
  cargo_id: String
  rol_id: String
  telefono: String
  firma: String
  foto_perfil: String
  email: String
}

type Cargo {
  id: ID!
  nombre: String
  descripcion: String
  gerarquia: Int
}

# ============================================================================
# TIPOS DE EMPRESA
# ============================================================================

# NOTA: el tipo Empresa, su input y su API se migraron a empresa.graphql
# (catálogo propio en Mongo con contrato de inacons). Se elimina el huérfano.

type DeleteResponse {
  success: Boolean
  message: String
}

# ============================================================================
# QUERIES
# ============================================================================

extend type Query {
  # Auth/Roles
  listRoles: [Role!]!
  getRole(id: ID!): Role
  
  # Usuario
  getUsuario(id: ID!): Usuario
  getAllUsuarios: [Usuario]
  usuariosCargo: [Usuario]
  getUsuariosByRegistrosGeneralesContables: [Usuario]
  """
  Usuarios inacons por rol (regex en nombre) y/o jerarquía de cargo.
  Paridad kapo-compras / inacons kanban proveedor.
  """
  getUsuariosByRolCargo(jerarquia: Int, rolRegex: String): [Usuario]
  """Unión contabilidad (rol *conta*) + gerencia (jerarquía 4)."""
  listarAprobadoresProveedorKanban: [Usuario!]!
  """Si el admin logueado puede validar cuentas / aprobar estados de proveedor."""
  puedeAprobarProveedorKanban: Boolean!
}

# ============================================================================
# MUTATIONS
# ============================================================================

extend type Mutation {
  # Roles
  addRole(nombre: String!, descripcion: String!, menusPermissions: [MenuPermissionInput!]!): Role!
  updateRole(id: ID!, nombre: String!, descripcion: String!, menusPermissions: [MenuPermissionInput!]!): Role!
  deleteRole(id: ID!): Role
  
  # Usuario
  createUsuario(data: UsuarioInput): Usuario
  updateUsuario(id: ID!, data: UsuarioInput!): Usuario
  deleteUsuario(id: ID!): Usuario
}
