# ============================================================================
# SCHEMA DE PROVEEDORES (migrado a Mongo, contrato idéntico a inacons)
# - Banco, MediosPagoProveedor y ContactoProveedor viven en sus propios schemas.
# - estadisticasCotizaciones / getEstadisticasCotizaciones se eliminaron
#   (cotizaciones NO se migra).
# - Mutaciones con argumentos posicionales, igual que inacons.
# ============================================================================

type Proveedor {
    id: ID!
    razon_social: String
    direccion: String
    nombre_comercial: String
    ruc: String
    rubro: String
    estado: String
    tipo: String
    actividad: String
    correo: String
    telefono: String
    estado_sunat: String
    condicion: String
    agente_retencion: Boolean
    sub_contrata: Boolean
    distrito: String
    provincia: String
    departamento: String

    # Relaciones
    mediosPago: [MediosPagoProveedor]
    contactos: [ContactoProveedor]
    # NOTA: se conserva en el contrato por compatibilidad, pero NO se calcula
    # (cotizaciones vive en compras y no se migró) -> devuelve null.
    estadisticasCotizaciones: EstadisticasDetalladas
}

type CotizacionPorEstado {
    estado: String!
    cantidad: Int!
    porcentaje: Float!
}

type EstadisticasDetalladas {
    proveedor_id: ID!
    razon_social: String!
    totalCotizaciones: Int!
    cotizacionesPorEstado: [CotizacionPorEstado]!
    primeraCotizacion: String
    ultimaCotizacion: String
}

type ProveedorBasico {
    id: ID
    razon_social: String
    direccion: String
    nombre_comercial: String
    ruc: String
    rubro: String
    estado: String
    tipo: String
    actividad: String
    correo: String
    telefono: String
    estado_sunat: String
    condicion: String
    agente_retencion: Boolean
    sub_contrata: Boolean
    distrito: String
    provincia: String
    departamento: String
}

type ProveedorPaginatedResponse {
    data: [Proveedor!]!
    total: Int!
    page: Int!
    limit: Int!
    totalPages: Int!
}

input ProveedorFilterInput {
    estado: String
    estados: [String]
    tipo: String
    rubro: String
    sub_contrata: Boolean
    departamento: String
    provincia: String
    distrito: String
    searchTerm: String
}

input ProveedorPaginationInput {
    page: Int
    limit: Int
    sortBy: String
    sortOrder: String
    filter: ProveedorFilterInput
}

extend type Query {
    listProveedor: [Proveedor]
    listProveedoresPaginated(filter: ProveedorPaginationInput): ProveedorPaginatedResponse!
    getProveedorById(id: ID!): Proveedor
    getProveedorByRuc(ruc: String!): Proveedor
    listProveedoresSubContrata: [ProveedorBasico]
    # Conservada por compatibilidad de contrato; devuelve null (sin cotizaciones).
    getEstadisticasCotizaciones(proveedorId: ID!): EstadisticasDetalladas
}

extend type Mutation {
    addProveedor(
        razon_social: String!
        ruc: String!
        direccion: String
        nombre_comercial: String
        rubro: String
        estado: String
        tipo: String
        actividad: String
        correo: String
        telefono: String
        estado_sunat: String
        condicion: String
        agente_retencion: Boolean
        sub_contrata: Boolean
        distrito: String
        provincia: String
        departamento: String
    ): Proveedor!

    updateProveedor(
        id: ID!
        razon_social: String
        ruc: String
        direccion: String
        nombre_comercial: String
        rubro: String
        estado: String
        tipo: String
        actividad: String
        correo: String
        telefono: String
        estado_sunat: String
        condicion: String
        agente_retencion: Boolean
        sub_contrata: Boolean
        distrito: String
        provincia: String
        departamento: String
    ): Proveedor

    deleteProveedor(id: ID!): Proveedor
}
