# ============================================================================
# ESQUEMA GRAPHQL - TIPO DOCUMENTO
# ============================================================================

type TipoDocumento {
  id: ID!
  codigo: String!
  nombre: String!
  descripcion: String
  estado: String!
  fechaCreacion: DateTime!
  fechaActualizacion: DateTime
}

input TipoDocumentoInput {
  nombre: String!
  descripcion: String
  estado: String!
}

input TipoDocumentoFiltros {
  nombre: String
  estado: String
}

type TipoDocumentoConnection {
  tiposDocumento: [TipoDocumento!]!
  totalCount: Int!
}

# Queries
type Query {
  obtenerTipoDocumento(id: ID!): TipoDocumento
  listarTiposDocumento(
    limit: Int
    offset: Int
    filters: TipoDocumentoFiltros
  ): TipoDocumentoConnection!
  findInactivos: [TipoDocumento!]!
  findActivos: [TipoDocumento!]!
}

# Mutations
type Mutation {
  crearTipoDocumento(input: TipoDocumentoInput!): TipoDocumento!
  actualizarTipoDocumento(id: ID!, input: TipoDocumentoInput!): TipoDocumento!
  eliminarTipoDocumento(id: ID!): Boolean!
}
