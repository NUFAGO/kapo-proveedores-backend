# ============================================================================
# SCHEMA DE MEDIOS DE PAGO DE PROVEEDOR (migrado desde inacons)
# Los tipos Proveedor y Banco se definen en proveedor.graphql y banco.graphql.
# NOTA: listMediosPagoProveedorNoValidadoWithArchivo de inacons NO se migra
# (depende de archivos_sustento fuera de alcance del listado simple).
# ============================================================================

type MediosPagoProveedor {
  id: ID
  proveedor_id: Proveedor
  entidad: Banco
  nro_cuenta: String
  detalles: String
  titular: String
  validado: Boolean
  mostrar: Boolean
}

type MediosPagoProveedorPaginatedResponse {
  data: [MediosPagoProveedor!]!
  total: Int!
  page: Int!
  limit: Int!
  totalPages: Int!
}

type MediosPagoProveedorLitleBox {
  proveedor_id: ProveedorLitleBox!
  medios_pago: [MedioPagoLitleBox!]!
}

type MedioPagoLitleBox {
  id: ID!
  nro_cuenta: String
  entidad: Banco
  detalles: String
  titular: String
  validado: Boolean
  mostrar: Boolean
}

type ProveedorLitleBox {
  id: ID!
  razon_social: String!
  nombre_comercial: String
  tipo: String!
  ruc: String!
  direccion: String
  rubro: String
  estado: String
  actividad: String
  correo: String
  horario: String
}

extend type Query {
  listMediosPagoProveedores: [MediosPagoProveedor!]!
  listMediosPagoProveedorByProveedor(proveedor_id: ID!): [MediosPagoProveedor!]!
  listMediosPagoProveedorByIds(ids: [ID!]!): [MediosPagoProveedor!]!
  listMediosPagoProveedorLitleBox: [MediosPagoProveedorLitleBox!]!
  listMediosPagoProveedorNoValidado(page: Int, limit: Int, search: String): MediosPagoProveedorPaginatedResponse!
}

extend type Mutation {
  addMediosPagoProveedor(
    proveedor_id: ID!
    entidad: ID
    nro_cuenta: String
    detalles: String
    titular: String
    validado: Boolean
    mostrar: Boolean
  ): MediosPagoProveedor!

  # Crea el medio + sus archivos de sustento de forma atómica (las URLs ya subidas a GCS).
  crearMedioPagoConSustentos(
    proveedor_id: ID!
    entidad: ID
    nro_cuenta: String
    detalles: String
    titular: String
    urls: [String!]!
  ): MediosPagoProveedor

  updateMediosPagoProveedor(
    id: ID!
    proveedor_id: ID
    entidad: ID
    nro_cuenta: String
    detalles: String
    titular: String
    validado: Boolean
    mostrar: Boolean
  ): MediosPagoProveedor

  deleteMediosPagoProveedor(id: ID!): MediosPagoProveedor
}
