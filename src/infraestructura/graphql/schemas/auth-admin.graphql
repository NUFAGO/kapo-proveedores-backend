# ============================================================================
# SCHEMA GraphQL PARA AUTENTICACIÓN DE USUARIOS EXTERNOS (ADMIN)
# ============================================================================

type LoginAdminResponse {
  id: ID!
  token: String!
  usuario: String!
  nombresA: String!
  role: RoleInfo!
}

type RoleInfo {
  id: ID!
  nombre: String!
}

type TokenAdminVerifyResponse {
  id: ID!
  tipo_usuario: String!
  proveedor_id: String
  role: RoleInfo
  iat: Int
  exp: Int
}

type TokenAdminRefreshResponse {
  payload: TokenAdminVerifyResponse!
  token: String!
}

# ============================================================================
# MUTATIONS
# ============================================================================

extend type Mutation {
  """
  Login específico para usuarios externos (admin)
  Usa autenticación externa pero genera nuestro JWT con tipo_usuario: 'admin'
  Solo funciona si el usuario tiene rol 'admin' en el sistema externo
  """
  loginAdmin(usuario: String!, contrasenna: String!): LoginAdminResponse!

  """
  Verifica si un token de admin es válido
  Retorna el payload del token con información del administrador
  """
  verifyTokenAdmin(token: String!): TokenAdminVerifyResponse!

  """
  Refresca un token de admin
  Genera un nuevo token con la misma información pero nueva fecha de expiración
  """
  refreshTokenAdmin(token: String!): TokenAdminRefreshResponse!
}
