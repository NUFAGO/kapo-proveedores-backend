# Tipos de entrada para ExpedientePago

input ExpedientePagoInput {

  ocId: String!

  ocCodigo: String!

  ocSnapshot: JSON!

  proveedorId: String!

  proveedorNombre: String!

  montoContrato: Float!

  fechaInicioContrato: DateTime!

  fechaFinContrato: DateTime!

  descripcion: String!

  requiereReportes: Boolean = false

  frecuenciaReporte: String

  minReportesPorSolicitud: Int

  modoValidacionReportes: String

  adminCreadorId: String!

}



input ExpedientePagoFilter {

  page: Int = 1

  limit: Int = 10

  ocId: String

  ocCodigo: String

  proveedorId: String

  estado: String

  adminCreadorId: String

  searchTerm: String

}



input UpdateExpedientePagoInput {

  ocId: String

  ocCodigo: String

  ocSnapshot: JSON

  proveedorId: String

  proveedorNombre: String

  montoContrato: Float

  fechaInicioContrato: DateTime

  fechaFinContrato: DateTime

  descripcion: String

  requiereReportes: Boolean

  frecuenciaReporte: String

  minReportesPorSolicitud: Int

  modoValidacionReportes: String

}



# Tipos de entrada para configuración de expediente

input TipoPagoConfigInput {

  categoriaChecklistId: String!

  checklistId: String!

  modoRestriccion: String!

  orden: Int

  requiereAnteriorPagado: Boolean

  porcentajeMaximo: Float

  porcentajeMinimo: Float

  permiteVincularReportes: Boolean

}



input ConfigurarExpedienteInput {

  expedienteId: String!

  documentosBaseIds: [String!]!

  tiposPago: [TipoPagoConfigInput!]!

}



# Tipo principal ExpedientePago

type ExpedientePago {

  id: ID!

  ocId: String!

  ocCodigo: String!

  ocSnapshot: JSON!

  fechaSnapshot: DateTime!

  proveedorId: String!

  proveedorNombre: String!

  montoContrato: Float!

  fechaInicioContrato: DateTime!

  fechaFinContrato: DateTime!

  descripcion: String!

  estado: String!

  montoComprometido: Float!

  montoPagado: Float!

  montoDisponible: Float!

  requiereReportes: Boolean!

  frecuenciaReporte: String

  minReportesPorSolicitud: Int

  modoValidacionReportes: String

  adminCreadorId: String!

  fechaCreacion: DateTime!

  fechaConfigurado: DateTime

}



# Respuesta paginada para ExpedientePago

type ExpedientePagoConnection {

  data: [ExpedientePago!]!

  total: Int!

  page: Int!

  limit: Int!

  totalPages: Int!

}



# Tipo completo de ExpedientePago con relaciones

type ExpedientePagoCompleto {

  id: ID!

  ocId: String!

  ocCodigo: String!

  proveedorId: String!

  proveedorNombre: String!

  montoContrato: Float!

  montoDisponible: Float!

  montoComprometido: Float!

  montoPagado: Float!

  estado: String!

  fechaInicioContrato: DateTime!

  fechaFinContrato: DateTime!

  descripcion: String!

  adminCreadorId: String!

  fechaCreacion: DateTime!

  fechaConfigurado: DateTime

  tiposPago: [TipoPagoOC!]!

  documentos: [DocumentoOC!]!

  """Cada solicitud del expediente con el mismo detalle que `detalleChecklistRevisionAprobacion` (checklist + requisitos + documentos subidos), si existe fila de aprobación."""
  solicitudesPagoDetalle: [SolicitudPagoConRevisionChecklist!]!

}

type SolicitudPagoConRevisionChecklist {
  solicitud: SolicitudPago!
  detalleRevisionChecklist: AprobacionChecklistRevisionDetalle
}



# Queries para ExpedientePago

extend type Query {

  # Obtener un expediente por ID

  obtenerExpedientePago(id: ID!): ExpedientePago

  

  # Listar expedientes con paginación y filtros

  listarExpedientesPago(filter: ExpedientePagoFilter): ExpedientePagoConnection

  

  # Obtener expediente por OC ID

  obtenerExpedientePorOcId(ocId: String!): ExpedientePago

  

  # Obtener expediente completo con todas sus relaciones y archivos

  obtenerExpedienteCompleto(id: ID!): ExpedientePagoCompleto

  """
  Igual que `obtenerExpedienteCompleto` (mismo tipo, incluye `solicitudesPagoDetalle`), resuelto por `ocId` de la OC en Inacons.
  Consulta sin autenticación (uso previsto: red interna / proxy del monolito).
  """
  obtenerExpedienteCompletoLibrePorOcId(ocId: String!): ExpedientePagoCompleto!

  

  # Obtener expedientes por proveedor

  obtenerExpedientesPorProveedor(proveedorId: String!, filter: ExpedientePagoFilter): ExpedientePagoConnection

}



# Input para guardar expediente con items seleccionados

input GuardarExpedienteItemsInput {

  ocData: OrdenCompraData!

  adminCreadorId: String!

  solicitudesPago: [ExpedienteItemInput!]!

  documentosOC: [ExpedienteItemInput!]!

}



# Datos de la orden de compra

input OrdenCompraData {

  id: String!

  codigo: String!

  proveedorId: String!

  proveedorNombre: String!

  montoContrato: Float!

  fechaInicioContrato: DateTime!

  fechaFinContrato: DateTime!

  descripcion: String

}



# Input para items del expediente

input ExpedienteItemInput {

  categoriaChecklistId: String!

  plantillaChecklistId: String!

  """Orden del tipo de pago en el expediente (>= 1). Si se omite, usa el índice del array."""

  orden: Int

  """Si es null, 0 o se omite: no aplica tope por %. Solo valores > 0 se persisten."""

  porcentajeMaximo: Float

  """Igual que máximo: 0 o null = sin piso por %. Requiere máximo > 0 para tener sentido."""

  porcentajeMinimo: Float

  permiteVincularReportes: Boolean

  """Solo aplica en `documentosOC`; si se omite, el documento se crea como obligatorio."""

  obligatorio: Boolean

  """Solo en `documentosOC`; si se omite, queda en false (no bloquea solicitudes de pago)."""

  bloqueaSolicitudPago: Boolean

}

"""Ítem de tipo de pago al sincronizar un expediente existente (id omitido = crear)."""

input ExpedienteItemActualizacionInput {

  id: ID

  categoriaChecklistId: String!

  plantillaChecklistId: String!

  orden: Int

  porcentajeMaximo: Float

  porcentajeMinimo: Float

  permiteVincularReportes: Boolean

}

"""Documento OC al sincronizar expediente existente (id omitido = crear)."""

input ExpedienteDocumentoActualizacionInput {

  id: ID

  categoriaChecklistId: String!

  plantillaChecklistId: String!

  obligatorio: Boolean

  bloqueaSolicitudPago: Boolean

}

input ActualizarExpedienteItemsInput {

  expedienteId: ID!

  solicitudesPago: [ExpedienteItemActualizacionInput!]!

  documentosOC: [ExpedienteDocumentoActualizacionInput!]!

}



# Mutations para ExpedientePago

extend type Mutation {

  # Crear un nuevo expediente

  crearExpedientePago(input: ExpedientePagoInput!): ExpedientePago

  

  # Configurar un expediente (documentos base y tipos de pago)

  configurarExpediente(input: ConfigurarExpedienteInput!): ExpedientePago

  

  # Guardar expediente con items seleccionados (crea expediente, documentos y tipos de pago)

  guardarExpedienteConItems(input: GuardarExpedienteItemsInput!): ExpedientePago

  
  actualizarExpedienteItems(input: ActualizarExpedienteItemsInput!): ExpedientePago

  

  # Actualizar estado de un expediente

  actualizarEstadoExpediente(id: ID!, estado: String!): ExpedientePago

  

  # Actualizar saldos de un expediente

  actualizarSaldosExpediente(

    id: ID!

    montoComprometido: Float!

    montoPagado: Float!

  ): ExpedientePago

  

  # Eliminar un expediente

  eliminarExpedientePago(id: ID!): Boolean

}

